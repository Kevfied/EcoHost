<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC-EcoHost | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glass: {
                            100: 'rgba(255, 255, 255, 0.1)',
                            200: 'rgba(255, 255, 255, 0.15)',
                            300: 'rgba(255, 255, 255, 0.2)',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'shake': 'shake 0.5s ease-in-out',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 20px rgba(249, 115, 22, 0.4)' },
                            '100%': { boxShadow: '0 0 60px rgba(249, 115, 22, 0.8)' },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .input-field {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: rgba(249, 115, 22, 0.5);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        .login-btn {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 50%, #c2410c 100%);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(249, 115, 22, 0.3);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 60%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 30%; top: 40%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 50%; top: 10%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 60%; top: 80%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 70%; top: 30%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 80%; top: 70%; animation-delay: 6s; }
        .particle:nth-child(8) { left: 90%; top: 50%; animation-delay: 7s; }

        /* Gradient orb background */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #f97316;
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #10b981;
            bottom: -50px;
            right: -50px;
            animation: float 15s ease-in-out infinite reverse;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(148, 163, 184, 0.6);
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .loading-spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Password change modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
    </style>
</head>
<body class="flex items-center justify-center">
    <!-- Background Elements -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Main Login Card -->
    <div id="login-card" class="glass-card rounded-2xl p-8 w-full max-w-md mx-4 animate-float">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-orange-500 to-orange-600 mb-4 shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-1">EcoHost</h1>
            <p class="text-slate-400 text-sm">Server Management Dashboard</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg">
            <p class="text-red-400 text-sm text-center"></p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5">
            <!-- Username Input -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="username" 
                        class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-white text-sm"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <input 
                        type="password" 
                        id="password" 
                        class="input-field w-full pl-10 pr-12 py-3 rounded-lg text-white text-sm"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" id="toggle-password" class="password-toggle">
                        <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <svg id="eye-off-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center">
                <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-orange-500 focus:ring-orange-500 focus:ring-offset-0">
                <label for="remember-me" class="ml-2 text-sm text-slate-400">Remember me</label>
            </div>

            <!-- Login Button -->
            <button 
                type="submit" 
                id="login-btn"
                class="login-btn w-full py-3 px-4 rounded-lg text-white font-semibold flex items-center justify-center gap-2"
            >
                <span id="btn-text">Sign In</span>
                <div id="btn-spinner" class="loading-spinner hidden"></div>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-6 text-center">
            <p class="text-xs text-slate-500">
                Secure authentication with role-based access control
            </p>
        </div>
    </div>

    <!-- Password Change Modal -->
    <div id="password-modal" class="modal-overlay">
        <div class="modal-content glass-card rounded-2xl p-8 w-full max-w-md mx-4">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-orange-500/20 mb-3">
                    <svg class="w-6 h-6 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-white">Change Password Required</h2>
                <p class="text-slate-400 text-sm mt-1">For security, please change your password before continuing.</p>
            </div>

            <div id="password-error" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg">
                <p class="text-red-400 text-sm text-center"></p>
            </div>

            <form id="password-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">New Password</label>
                    <input 
                        type="password" 
                        id="new-password" 
                        class="input-field w-full px-4 py-3 rounded-lg text-white text-sm"
                        placeholder="Min 8 chars, 1 uppercase, 1 number"
                        required
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        class="input-field w-full px-4 py-3 rounded-lg text-white text-sm"
                        placeholder="Confirm new password"
                        required
                    >
                </div>
                <button 
                    type="submit" 
                    id="password-btn"
                    class="login-btn w-full py-3 px-4 rounded-lg text-white font-semibold flex items-center justify-center gap-2"
                >
                    <span id="password-btn-text">Update Password</span>
                    <div id="password-btn-spinner" class="loading-spinner hidden"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const errorMessage = document.getElementById('error-message');
        const errorText = errorMessage.querySelector('p');
        const loginCard = document.getElementById('login-card');
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOffIcon = document.getElementById('eye-off-icon');
        const rememberMe = document.getElementById('remember-me');

        // Password Change Modal Elements
        const passwordModal = document.getElementById('password-modal');
        const passwordForm = document.getElementById('password-form');
        const passwordError = document.getElementById('password-error');
        const passwordErrorText = passwordError.querySelector('p');
        const passwordBtn = document.getElementById('password-btn');
        const passwordBtnText = document.getElementById('password-btn-text');
        const passwordBtnSpinner = document.getElementById('password-btn-spinner');

        let currentUser = null;

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            eyeIcon.classList.toggle('hidden');
            eyeOffIcon.classList.toggle('hidden');
        });

        // Show error function
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            loginCard.classList.add('error-shake');
            setTimeout(() => loginCard.classList.remove('error-shake'), 500);
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        function showPasswordError(message) {
            passwordErrorText.textContent = message;
            passwordError.classList.remove('hidden');
        }

        function hidePasswordError() {
            passwordError.classList.add('hidden');
        }

        // Set loading state
        function setLoading(loading) {
            loginBtn.disabled = loading;
            btnText.textContent = loading ? 'Signing In...' : 'Sign In';
            btnSpinner.classList.toggle('hidden', !loading);
        }

        function setPasswordLoading(loading) {
            passwordBtn.disabled = loading;
            passwordBtnText.textContent = loading ? 'Updating...' : 'Update Password';
            passwordBtnSpinner.classList.toggle('hidden', !loading);
        }

        // Check if already logged in
        async function checkAuth() {
            try {
                const response = await fetch('/auth/verify', {
                    credentials: 'same-origin'
                });
                if (response.ok) {
                    window.location.href = '/';
                }
            } catch (e) {
                // Not logged in, stay on login page
            }
        }

        // Handle login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value;

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    currentUser = data.user;
                    
                    if (data.require_password_change) {
                        // Show password change modal
                        passwordModal.classList.add('active');
                        setLoading(false);
                    } else {
                        // Redirect to dashboard
                        window.location.href = '/';
                    }
                } else {
                    showError(data.detail || 'Login failed. Please check your credentials.');
                    setLoading(false);
                }
            } catch (e) {
                showError('Network error. Please try again.');
                setLoading(false);
            }
        });

        // Handle password change
        passwordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hidePasswordError();
            setPasswordLoading(true);

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showPasswordError('Passwords do not match');
                setPasswordLoading(false);
                return;
            }

            // Validate password strength
            if (newPassword.length < 8) {
                showPasswordError('Password must be at least 8 characters');
                setPasswordLoading(false);
                return;
            }
            if (!/[A-Z]/.test(newPassword)) {
                showPasswordError('Password must contain at least one uppercase letter');
                setPasswordLoading(false);
                return;
            }
            if (!/[0-9]/.test(newPassword)) {
                showPasswordError('Password must contain at least one number');
                setPasswordLoading(false);
                return;
            }

            try {
                const response = await fetch('/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Password changed, redirect to dashboard
                    window.location.href = '/';
                } else {
                    showPasswordError(data.detail || 'Failed to change password');
                    setPasswordLoading(false);
                }
            } catch (e) {
                showPasswordError('Network error. Please try again.');
                setPasswordLoading(false);
            }
        });

        // Check auth on load
        checkAuth();
    </script>
</body>
</html>
